<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🛒 Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;
  --card:#121212;
  --card-2:#1a1a1a;
  --muted:#c8c2b8;
  --gold:#d4af37;
  --gold-soft:#f1d982;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 10% 10%,#1a1a1a 0,#090909 40%,#040404 100%);color:#fff;font-family:Poppins}
.container{max-width:980px;margin:28px auto;padding:18px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.header h1{margin:0;font-size:24px;letter-spacing:.4px;text-shadow:0 0 20px rgba(212,175,55,.28)}
.list{display:flex;flex-direction:column;gap:12px}
.card{display:flex;gap:12px;background:linear-gradient(160deg,#171717,#101010);padding:12px;border-radius:14px;align-items:center;box-shadow:0 12px 32px rgba(0,0,0,.55);border:1px solid rgba(212,175,55,.08)}
.card img{width:96px;height:76px;object-fit:cover;border-radius:8px}
.details{flex:1}
.title{font-weight:700;margin-bottom:6px}
.remove{background:#2b2b2b;border:none;padding:8px 10px;border-radius:8px;color:#fff;cursor:pointer}
.qty-wrap{display:flex;align-items:center;gap:10px;margin-top:8px}
.qty-btn{background:#232323;border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-weight:800}
.qty-val{min-width:22px;text-align:center;font-weight:700}
.payment{margin-top:14px;background:linear-gradient(160deg,#161616,#0d0d0d);padding:16px;border-radius:12px;border:1px solid rgba(212,175,55,.2);box-shadow:0 0 26px rgba(212,175,55,.1)}
.payment h3{margin:0 0 8px;font-size:16px;color:var(--gold-soft)}
.payment label{display:block;margin-top:8px;color:#ddd}
.payment-details{margin-top:14px;background:var(--card-2);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.payment-details h4{margin:0 0 10px;color:var(--gold-soft)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{margin-bottom:10px}
.field input,.field select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:#0f0f0f;color:#fff;font-family:inherit}
.field small{color:#b7b1a5}
.summary{margin-top:18px;background:#0e0e0e;padding:14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(212,175,55,.12)}
.checkout{background:linear-gradient(90deg,var(--gold),#f3e0a8);border:none;padding:10px 16px;border-radius:10px;font-weight:800;cursor:pointer;color:#000;box-shadow:0 8px 22px rgba(212,175,55,.28)}
.empty{padding:40px;text-align:center;color:var(--muted);background:var(--card);border-radius:12px}
.link-back{display:block;margin-top:12px;color:var(--gold);text-decoration:none}
.hidden{display:none}
.helper{color:var(--muted);font-size:12px}
@media(max-width:720px){
  .card{flex-direction:row}
  .card img{width:76px;height:60px}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🛒 Cart</h1>
    <div id="count" style="color:#bfb8ad">0 items</div>
  </div>

  <div id="itemsRoot" class="list"></div>

  <div id="emptyMsg" class="empty" style="display:none">
    Your cart is empty.<br>
    <a class="link-back" href="index.html">← Back to shopping</a>
  </div>

  <div id="summary" style="display:none">
    <div class="payment">
      <h3>Select Payment Option</h3>
      <label><input type="radio" name="paymentMethod" value="UPI"> UPI</label>
      <label><input type="radio" name="paymentMethod" value="Card"> Credit / Debit Card</label>
      <label><input type="radio" name="paymentMethod" value="COD"> Cash on Delivery</label>

      <div id="upiDetails" class="payment-details hidden">
        <h4>UPI Details</h4>
        <div class="field">
          <input id="upiId" type="text" placeholder="Enter UPI ID (example@bank)">
          <small>Use your linked UPI ID for faster checkout.</small>
        </div>
      </div>

      <div id="cardDetails" class="payment-details hidden">
        <h4>Card Details</h4>
        <div class="field">
          <input id="cardName" type="text" placeholder="Name on card">
        </div>
        <div class="field">
          <input id="cardNumber" type="text" inputmode="numeric" maxlength="19" placeholder="Card number">
          <small class="helper">We only show masked card in checkout summary.</small>
        </div>
        <div class="field-row">
          <div class="field">
            <input id="cardExpiry" type="text" maxlength="5" placeholder="MM/YY">
          </div>
          <div class="field">
            <input id="cardCvv" type="password" inputmode="numeric" maxlength="4" placeholder="CVV">
          </div>
        </div>
      </div>
    </div>

    <div class="summary">
      <div>
        <div style="color:#bfb8ad">Total</div>
        <div id="totalAmt" style="font-weight:800;font-size:18px">₹0</div>
      </div>
      <div>
        <button id="checkoutBtn" class="checkout">Proceed to Checkout</button>
      </div>
    </div>
  </div>

</div>

<script>
function parsePrice(value) {
  if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
  const cleaned = String(value ?? '').replace(/[^\d.]/g, '');
  const parsed = Number(cleaned);
  return Number.isFinite(parsed) ? parsed : 0;
}

function normalizeCartItem(item) {
  return {
    ...item,
    name: item?.name || item?.product_name || 'Product',
    img: item?.img || item?.image || item?.image_url || '',
    price: parsePrice(item?.price ?? item?.product_price),
    qty: Math.max(1, Number(item?.qty || 1))
  };
}

function readCart(){
  try{
    const raw = JSON.parse(localStorage.getItem('cart')) || [];
    return raw.map(normalizeCartItem);
  } catch(e){ return []; }
}

function writeCart(cart){
  localStorage.setItem('cart', JSON.stringify(cart));
}

function setPaymentSections(paymentMethod) {
  document.getElementById('upiDetails').classList.toggle('hidden', paymentMethod !== 'UPI');
  document.getElementById('cardDetails').classList.toggle('hidden', paymentMethod !== 'Card');
}

function restorePaymentDetails() {
  const paymentDetails = JSON.parse(localStorage.getItem('paymentDetails') || '{}');
  document.getElementById('upiId').value = paymentDetails.upiId || '';
  document.getElementById('cardName').value = paymentDetails.cardName || '';
  document.getElementById('cardNumber').value = paymentDetails.cardNumber || '';
  document.getElementById('cardExpiry').value = paymentDetails.cardExpiry || '';
  document.getElementById('cardCvv').value = paymentDetails.cardCvv || '';
}

function render(){
  const items = readCart();
  const root = document.getElementById('itemsRoot');
  const empty = document.getElementById('emptyMsg');
  const summary = document.getElementById('summary');
  const count = document.getElementById('count');

  root.innerHTML = '';
  if(!items.length){
    empty.style.display = 'block';
    summary.style.display = 'none';
    count.textContent = '0 items';
    return;
  }

  empty.style.display = 'none';
  summary.style.display = 'block';
  const totalQty = items.reduce((sum, i) => sum + i.qty, 0);
  count.textContent = totalQty + (totalQty > 1 ? ' items' : ' item');

  let total = 0;
  items.forEach((it, idx) => {
    total += it.price * it.qty;

    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = it.img || 'https://via.placeholder.com/300x200?text=No+Image';
    img.alt = it.name;

    const details = document.createElement('div');
    details.className = 'details';
    details.innerHTML = `<div class="title">${it.name}</div>`;

    const qtyWrap = document.createElement('div');
    qtyWrap.className = 'qty-wrap';

    const minusBtn = document.createElement('button');
    minusBtn.className = 'qty-btn';
    minusBtn.textContent = '-';

    const qtyVal = document.createElement('div');
    qtyVal.className = 'qty-val';
    qtyVal.textContent = String(it.qty);

    const plusBtn = document.createElement('button');
    plusBtn.className = 'qty-btn';
    plusBtn.textContent = '+';

    qtyWrap.appendChild(minusBtn);
    qtyWrap.appendChild(qtyVal);
    qtyWrap.appendChild(plusBtn);
    details.appendChild(qtyWrap);

    const right = document.createElement('div');
    right.innerHTML = `<div style="font-weight:800">₹${(it.price * it.qty).toLocaleString('en-IN')}</div>`;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove';
    removeBtn.textContent = 'Remove';

    removeBtn.onclick = () => {
      const cart = readCart();
      cart.splice(idx, 1);
      writeCart(cart);
      render();
    };

    minusBtn.onclick = () => {
      const cart = readCart();
      if (cart[idx].qty <= 1) return;
      cart[idx].qty -= 1;
      writeCart(cart);
      render();
    };

    plusBtn.onclick = () => {
      const cart = readCart();
      cart[idx].qty += 1;
      writeCart(cart);
      render();
    };

    card.appendChild(img);
    card.appendChild(details);
    card.appendChild(right);
    card.appendChild(removeBtn);
    root.appendChild(card);
  });

  document.getElementById('totalAmt').textContent = '₹' + total.toLocaleString('en-IN');

  const savedPayment = localStorage.getItem('paymentMethod');
  if (savedPayment) {
    const option = document.querySelector(`input[name="paymentMethod"][value="${savedPayment}"]`);
    if (option) {
      option.checked = true;
      setPaymentSections(savedPayment);
    }
  }

  restorePaymentDetails();
}

function validatePaymentDetails(paymentMethod) {
  const paymentDetails = {};

  if (paymentMethod === 'UPI') {
    const upiId = document.getElementById('upiId').value.trim();
    if (!/^[\w.-]+@[\w.-]+$/.test(upiId)) {
      alert('Please enter a valid UPI ID.');
      return null;
    }
    paymentDetails.upiId = upiId;
  }

  if (paymentMethod === 'Card') {
    const cardName = document.getElementById('cardName').value.trim();
    const cardNumberRaw = document.getElementById('cardNumber').value;
    const cardNumber = cardNumberRaw.replace(/\D/g, '');
    const cardExpiry = document.getElementById('cardExpiry').value.trim();
    const cardCvv = document.getElementById('cardCvv').value.trim();

    const validCardNumber = /^\d{12,19}$/.test(cardNumber);
    const validExpiry = /^(0[1-9]|1[0-2])\/\d{2}$/.test(cardExpiry);
    const validCvv = /^\d{3,4}$/.test(cardCvv);

    if (!cardName || !validCardNumber || !validExpiry || !validCvv) {
      alert('Please enter valid card details (Name, Card Number, MM/YY, CVV).');
      return null;
    }

    paymentDetails.cardName = cardName;
    paymentDetails.cardNumber = cardNumber;
    paymentDetails.cardExpiry = cardExpiry;
    paymentDetails.cardCvv = cardCvv;
  }

  if (paymentMethod === 'COD') {
    paymentDetails.mode = 'Cash on Delivery';
  }

  localStorage.setItem('paymentDetails', JSON.stringify(paymentDetails));
  return paymentDetails;
}

const cardNumberInput = document.getElementById('cardNumber');
const cardExpiryInput = document.getElementById('cardExpiry');

cardNumberInput.addEventListener('input', () => {
  const digits = cardNumberInput.value.replace(/\D/g, '').slice(0, 19);
  cardNumberInput.value = digits.replace(/(.{4})/g, '$1 ').trim();
});

cardExpiryInput.addEventListener('input', () => {
  const digits = cardExpiryInput.value.replace(/\D/g, '').slice(0, 4);
  if (digits.length <= 2) {
    cardExpiryInput.value = digits;
  } else {
    cardExpiryInput.value = `${digits.slice(0, 2)}/${digits.slice(2)}`;
  }
});

document.querySelectorAll('input[name="paymentMethod"]').forEach((radio) => {
  radio.addEventListener('change', (event) => {
    setPaymentSections(event.target.value);
  });
});

document.getElementById('checkoutBtn').addEventListener('click', ()=> {
  const selectedPayment = document.querySelector('input[name="paymentMethod"]:checked');
  if (!selectedPayment){
    alert('Please choose a payment option');
    return;
  }

  const details = validatePaymentDetails(selectedPayment.value);
  if (!details) return;

  localStorage.setItem('paymentMethod', selectedPayment.value);
  window.location.href = 'checkout.html';
});

render();
</script>

</body>
</html>
