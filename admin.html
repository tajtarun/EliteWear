<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:#0b0b0c;font-family:Poppins,sans-serif;color:#fff;padding:40px}
h2{color:#d4af37}
.container{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap}
.image-box{width:200px;height:200px;background:#111;border-radius:12px;border:2px dashed #333;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.image-box span{font-size:40px;color:#d4af37;position:absolute}
.preview{width:100%;height:100%;object-fit:cover;border-radius:12px;display:none}
.form{display:flex;flex-direction:column;gap:15px;width:250px}
input{padding:10px;border-radius:8px;border:none;background:#111;color:#fff}
button{padding:10px;border:none;border-radius:8px;background:#d4af37;font-weight:bold;cursor:pointer}
#status{margin-top:12px;color:#cfcfcf;min-height:20px}
</style>
</head>
<body>
<h2>Add Product</h2>

<div class="container">
  <label class="image-box" id="imageBox" for="fileInput">
    <span id="plus">+</span>
    <img id="previewImg" class="preview" alt="Product preview" />
  </label>

  <input type="file" id="fileInput" accept="image/*" hidden>

  <div class="form">
    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="price" placeholder="Product Price">
    <input type="text" id="size" placeholder="Product Size">
    <button id="submitBtn" type="button">Submit</button>
    <div id="status"></div>
  </div>
</div>

<script>
const sbClient = window.supabase.createClient(
  "https://vxcoanhvcglxbpxsvsxv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4Y29hbmh2Y2dseGJweHN2c3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2MTk4NjgsImV4cCI6MjA4MzE5NTg2OH0.RIx4Yfy74CWWr7vvoh2R5CcFn9Mz6oTw3nsNWkzuRTw"
);

const imageBox = document.getElementById('imageBox');
const fileInput = document.getElementById('fileInput');
const previewImg = document.getElementById('previewImg');
const plus = document.getElementById('plus');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');

imageBox.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files?.[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    previewImg.src = e.target.result;
    previewImg.style.display = 'block';
    plus.style.display = 'none';
  };
  reader.readAsDataURL(file);
});

submitBtn.addEventListener('click', addProduct);

async function addProduct() {
  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  const size = document.getElementById('size').value.trim();
  const file = fileInput.files?.[0];

  if (!name || !price || !size || !file) {
    statusEl.textContent = 'Please fill all fields and select an image.';
    return;
  }

  if (Number(price) <= 0) {
    statusEl.textContent = 'Please enter a valid product price.';
    return;
  }

  submitBtn.disabled = true;
  statusEl.textContent = 'Uploading product...';

  try {
    const ext = file.name.split('.').pop() || 'jpg';
    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

    // Try both possible bucket names
    const bucketCandidates = ['products', 'product_images'];
    let uploadedBucket = null;
    let uploadErr = null;

    for (const bucket of bucketCandidates) {
      const { error } = await sbClient.storage.from(bucket).upload(fileName, file, { upsert: false });
      if (!error) {
        uploadedBucket = bucket;
        break;
      }
      uploadErr = error;
    }

    if (!uploadedBucket) {
      statusEl.textContent = `Image upload failed: ${uploadErr?.message || 'Check bucket/policy.'}`;
      submitBtn.disabled = false;
      return;
    }

    const { data: publicData } = sbClient.storage.from(uploadedBucket).getPublicUrl(fileName);
    const imageUrl = publicData?.publicUrl;

    // Try both possible table schema styles
    const payloads = [
      { product_name: name, product_price: Number(price), product_size: size, image_url: imageUrl },
      { name, price: Number(price), size, image: imageUrl }
    ];

    let insertErr = null;
    let inserted = false;

    for (const payload of payloads) {
      const { error } = await sbClient.from('products').insert([payload]);
      if (!error) {
        inserted = true;
        break;
      }
      insertErr = error;
    }

    if (!inserted) {
      statusEl.textContent = `Saving product failed: ${insertErr?.message || 'Check table/policy.'}`;
      submitBtn.disabled = false;
      return;
    }

    statusEl.textContent = 'Product added successfully. Redirecting...';
    setTimeout(() => { window.location.href = 'index.html'; }, 700);

  } catch (err) {
    statusEl.textContent = `Unexpected error: ${err?.message || 'Unknown error'}`;
    submitBtn.disabled = false;
  }
}
</script>
</body>
</html>
