<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - EliteWear</title>

  <style>
    :root {
      --bg: #060606;
      --card: #151515;
      --card-2: #101010;
      --line: rgba(212, 175, 55, 0.22);
      --text: #f5f5f5;
      --muted: #bbb5a9;
      --gold: #d4af37;
      --gold-soft: #f5de92;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1b1b 0%, #090909 40%, #050505 100%);
      color: var(--text);
      margin: 0;
      padding: 24px;
    }

    .wrapper {
      max-width: 980px;
      margin: 0 auto;
    }

    h2 {
      margin-top: 0;
      font-size: 30px;
      letter-spacing: 0.5px;
      text-shadow: 0 0 18px rgba(212,175,55,0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
    }

    .panel {
      background: linear-gradient(165deg, var(--card), var(--card-2));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 16px 38px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.08) inset;
    }

    .section-title {
      font-size: 18px;
      margin: 0 0 12px;
      color: var(--gold-soft);
    }

    .item {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .item img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 10px;
      background: #222;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .item-name { font-weight: 700; }
    .item-meta { color: var(--muted); font-size: 13px; }

    .item-right {
      text-align: right;
      min-width: 110px;
    }

    .item-total { font-weight: 700; }

    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: #2b2b2b;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }

    .qty-val { min-width: 20px; text-align: center; }

    .line {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      color: var(--muted);
    }

    .line strong { color: var(--text); }

    .big-total {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 20px;
      font-weight: 800;
      color: var(--gold-soft);
    }

    .buy-btn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #000;
      background: linear-gradient(90deg, var(--gold), #f6e2a2);
      box-shadow: 0 6px 24px rgba(212,175,55,0.35);
    }

    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .login-card {
      width: 92%;
      max-width: 460px;
      background: linear-gradient(165deg, #1f1f1f, #141414);
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.6), 0 0 28px rgba(212,175,55,0.18);
      text-align: center;
    }

    .login-card h3 { margin-top: 2px; color: var(--gold-soft); }
    .login-card p { margin: 6px 0 8px; color: var(--muted); font-size: 13px; }

    .login-row { margin-top: 8px; }

    .login-row input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #0f0f0f;
      color: #fff;
    }

    .login-submit {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(90deg, var(--gold), #efd98f);
      color: #000;
    }

    .muted-mini { color: var(--muted); font-size: 12px; margin-top: 8px; }

    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <h2>Secure Checkout</h2>

  <div class="grid">
    <div class="panel">
      <h3 class="section-title">Items in your order</h3>
      <div id="cartBox"></div>
    </div>

    <div class="panel">
      <h3 class="section-title">Order Summary</h3>
      <div id="summaryLines"></div>
      <div class="big-total">
        <span>Total</span>
        <span id="total">₹0</span>
      </div>
      <button class="buy-btn" onclick="buy()">Buy Now</button>
    </div>
  </div>
</div>

<div id="loginBox">
  <div class="login-card">
    <h3>Sign In to Continue</h3>
    <p>One-time sign-in. Next time, you will be automatically signed in.</p>
    <div class="login-row"><input id="name" placeholder="Name"></div>
    <div class="login-row"><input id="email" type="email" placeholder="Email"></div>
    <div class="login-row"><input id="phone" placeholder="Phone"></div>
    <div class="login-row"><input id="address" placeholder="Address"></div>
    <button class="login-submit" onclick="submitLogin()">One-Time Sign In</button>
    <div class="muted-mini">Your profile is saved securely.</div>
  </div>
</div>

<script>
const API_FALLBACKS = [
  "https://elitewear-backend.onrender.com",
  "http://127.0.0.1:3000"
];

function parsePrice(value) {
  if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
  const cleaned = String(value ?? '').replace(/[^\d.]/g, '');
  const parsed = Number(cleaned);
  return Number.isFinite(parsed) ? parsed : 0;
}

function normalizeCartItem(item) {
  return {
    ...item,
    name: item?.name || item?.product_name || "Product",
    img: item?.img || item?.image || item?.image_url || "",
    qty: Math.max(1, Number(item?.qty || 1)),
    price: parsePrice(item?.price ?? item?.product_price)
  };
}

function readCart() {
  try {
    const raw = JSON.parse(localStorage.getItem("cart")) || [];
    return raw.map(normalizeCartItem);
  } catch (e) {
    return [];
  }
}

function writeCart(items) {
  localStorage.setItem("cart", JSON.stringify(items));
}

function maskCard(number) {
  const clean = String(number || '').replace(/\D/g, '');
  if (clean.length < 4) return '••••';
  return '•••• •••• •••• ' + clean.slice(-4);
}

function isPersistedSignedIn() {
  try {
    const payload = JSON.parse(localStorage.getItem("userData") || "null");
    if (!payload) return false;
    return Boolean(payload.name && payload.email && payload.phone && payload.address && localStorage.getItem("userSignedIn") === "true");
  } catch {
    return false;
  }
}

let cart = readCart();
let user = JSON.parse(localStorage.getItem("userData") || "null");
if (!isPersistedSignedIn()) user = null;

function loadCart() {
  cart = readCart();

  const box = document.getElementById("cartBox");
  const summary = document.getElementById("summaryLines");
  let subtotal = 0;
  let qtyTotal = 0;
  box.innerHTML = "";

  cart.forEach((item, index) => {
    const lineTotal = item.price * item.qty;
    subtotal += lineTotal;
    qtyTotal += item.qty;

    const row = document.createElement("div");
    row.className = "item";
    row.innerHTML = `
      <div class="item-left">
        <img src="${item.img || "https://via.placeholder.com/200x200?text=No+Image"}" alt="${item.name}">
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-meta">₹${item.price.toLocaleString("en-IN")} each</div>
          <div class="qty-wrap">
            <button class="qty-btn" data-action="minus" data-index="${index}">-</button>
            <div class="qty-val">${item.qty}</div>
            <button class="qty-btn" data-action="plus" data-index="${index}">+</button>
          </div>
        </div>
      </div>
      <div class="item-right">
        <div class="item-total">₹${lineTotal.toLocaleString("en-IN")}</div>
        <div class="item-meta">Item total</div>
      </div>
    `;
    box.appendChild(row);
  });

  if (!cart.length) {
    box.innerHTML = "<p>Your cart is empty.</p>";
  }

  const paymentMethod = localStorage.getItem("paymentMethod") || "Not selected";
  const paymentDetails = JSON.parse(localStorage.getItem("paymentDetails") || "{}");

  let paymentInfo = "Not selected";
  if (paymentMethod === 'UPI') paymentInfo = paymentDetails.upiId || 'UPI';
  if (paymentMethod === 'Card') paymentInfo = maskCard(paymentDetails.cardNumber);
  if (paymentMethod === 'COD') paymentInfo = 'Cash on Delivery';

  summary.innerHTML = `
    <div class="line"><span>Items (${qtyTotal})</span><strong>₹${subtotal.toLocaleString("en-IN")}</strong></div>
    <div class="line"><span>Payment Method</span><strong>${paymentMethod}</strong></div>
    <div class="line"><span>Payment Details</span><strong>${paymentInfo}</strong></div>
  `;

  document.getElementById("total").innerText = "₹" + subtotal.toLocaleString("en-IN");
  return subtotal;
}

document.addEventListener("click", (e) => {
  const btn = e.target.closest(".qty-btn");
  if (!btn) return;

  const idx = Number(btn.dataset.index);
  const action = btn.dataset.action;
  const items = readCart();
  if (!items[idx]) return;

  if (action === "minus" && items[idx].qty > 1) items[idx].qty -= 1;
  if (action === "plus") items[idx].qty += 1;

  writeCart(items);
  loadCart();
});

function buy() {
  if (!cart.length) {
    alert("Cart empty");
    return;
  }

  if (!user) {
    document.getElementById("loginBox").style.display = "flex";
    return;
  }

  placeOrder();
}

function validateUserInput(userInfo) {
  if (!userInfo.name || !userInfo.email || !userInfo.phone || !userInfo.address) return false;
  if (!/^\S+@\S+\.\S+$/.test(userInfo.email)) return false;
  if (!/^\d{10,15}$/.test(userInfo.phone.replace(/\D/g, ''))) return false;
  return true;
}

async function submitLogin() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  const profile = { name, email, phone, address };

  if (!validateUserInput(profile)) {
    alert("Please enter valid name, email, phone, and address.");
    return;
  }

  try {
    const savedUser = await saveSignedInUser(profile);
    user = savedUser;
    localStorage.setItem("userData", JSON.stringify(savedUser));
    localStorage.setItem("userSignedIn", "true");
    document.getElementById("loginBox").style.display = "none";
    placeOrder();
  } catch (error) {
    alert("Sign-in server not reachable. Please try again in a moment.");
  }
}

async function fetchWithFallback(path, options) {
  let lastError = null;

  for (const baseUrl of API_FALLBACKS) {
    try {
      const res = await fetch(`${baseUrl}${path}`, options);
      return { res, baseUrl };
    } catch (err) {
      lastError = err;
    }
  }

  throw lastError || new Error("Network error");
}

async function saveSignedInUser(userInfo) {
  const { res } = await fetchWithFallback("/signin", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(userInfo)
  });

  if (!res.ok) {
    throw new Error("Sign-in save failed");
  }

  const payload = await res.json().catch(() => ({}));
  return {
    ...userInfo,
    ...(payload?.user_id ? { user_id: payload.user_id } : {})
  };
}

async function placeOrder() {
  const total = loadCart();
  if (!Number(total) || total <= 0) {
    alert("Cart total is invalid. Please update quantities and try again.");
    return;
  }

  if (!user) {
    document.getElementById("loginBox").style.display = "flex";
    return;
  }

  try {
    const { res, baseUrl } = await fetchWithFallback("/order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user,
        cart: readCart(),
        total,
        payment_method: localStorage.getItem("paymentMethod") || "Not specified",
        payment_details: JSON.parse(localStorage.getItem("paymentDetails") || "{}")
      })
    });

    const data = await res.json().catch(() => ({}));

    if (res.ok && data.success) {
      alert("Order Placed Successfully!");
      localStorage.removeItem("cart");
      window.location.href = "thankyou.html";
      return;
    }

    alert(data.message || `Order failed on ${baseUrl}. Please try again.`);
  } catch (err) {
    alert("Server not reachable. Please try again in a moment.");
  }
}

loadCart();
</script>

</body>
</html>
