<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - EliteWear</title>

  <style>
    :root {
      --bg: #060606;
      --card: #151515;
      --card-2: #101010;
      --line: rgba(212, 175, 55, 0.22);
      --text: #f5f5f5;
      --muted: #bbb5a9;
      --gold: #d4af37;
      --gold-soft: #f5de92;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1b1b 0%, #090909 40%, #050505 100%);
      color: var(--text);
      margin: 0;
      padding: 24px;
    }

    .wrapper {
      max-width: 980px;
      margin: 0 auto;
    }

    h2 {
      margin-top: 0;
      font-size: 30px;
      letter-spacing: 0.5px;
      text-shadow: 0 0 18px rgba(212,175,55,0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
    }

    .panel {
      background: linear-gradient(165deg, var(--card), var(--card-2));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 16px 38px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.08) inset;
    }

    .section-title {
      font-size: 18px;
      margin: 0 0 12px;
      color: var(--gold-soft);
    }

    .item {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .item img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 10px;
      background: #222;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .item-name { font-weight: 700; }
    .item-meta { color: var(--muted); font-size: 13px; }

    .item-right {
      text-align: right;
      min-width: 110px;
    }

    .item-total { font-weight: 700; }

    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: #2b2b2b;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }

    .qty-val { min-width: 20px; text-align: center; }

    .line {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      color: var(--muted);
    }

    .line strong { color: var(--text); }

    .big-total {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 20px;
      font-weight: 800;
      color: var(--gold-soft);
    }

    .buy-btn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #000;
      background: linear-gradient(90deg, var(--gold), #f6e2a2);
      box-shadow: 0 6px 24px rgba(212,175,55,0.35);
    }

    #loginBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .login-card {
      width: 92%;
      max-width: 460px;
      background: linear-gradient(165deg, #1f1f1f, #141414);
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.6), 0 0 28px rgba(212,175,55,0.18);
      text-align: center;
    }

    .login-card h3 { margin-top: 2px; color: var(--gold-soft); }
    .login-card p { margin: 6px 0 8px; color: var(--muted); font-size: 13px; }

    .login-row { margin-top: 8px; }

    .login-row input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #0f0f0f;
      color: #fff;
    }

    .login-submit {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 9px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(90deg, var(--gold), #efd98f);
      color: #000;
    }

    .muted-mini { color: var(--muted); font-size: 12px; margin-top: 8px; }

    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <h2>Secure Checkout</h2>

  <div class="grid">
    <div class="panel">
      <h3 class="section-title">Items in your order</h3>
      <div id="cartBox"></div>
    </div>

    <div class="panel">
      <h3 class="section-title">Order Summary</h3>
      <div id="summaryLines"></div>
      <div class="big-total">
        <span>Total</span>
        <span id="total">₹0</span>
      </div>
      <button class="buy-btn" onclick="buy()">Buy Now</button>
    </div>
  </div>
</div>

<div id="loginBox">
  <div class="login-card">
    <h3>Sign In to Continue</h3>
    <p>One-time sign-in. Next time, you will be automatically signed in.</p>
    <form id="signinForm" autocomplete="off" onsubmit="event.preventDefault(); submitLogin();">
      <input type="text" name="fake_username" autocomplete="username" style="display:none">
      <input type="password" name="fake_password" autocomplete="new-password" style="display:none">
      <div class="login-row"><input id="name" name="ew_name" placeholder="Name" readonly onfocus="this.removeAttribute('readonly');"></div>
      <div class="login-row"><input id="email" name="ew_email" type="email" placeholder="Email" readonly onfocus="this.removeAttribute('readonly');"></div>
      <div class="login-row"><input id="phone" name="ew_phone" placeholder="Phone" readonly onfocus="this.removeAttribute('readonly');"></div>
      <div class="login-row"><input id="address" name="ew_address" placeholder="Address" readonly onfocus="this.removeAttribute('readonly');"></div>
      <button type="submit" class="login-submit">One-Time Sign In</button>
    </form>
    <div class="muted-mini">Your profile is saved securely.</div>
  </div>
</div>

<script>
const API_FALLBACKS = [
  "https://elitewear-backend.onrender.com"
];

async function fetchWithFallback(path, options) {
  let lastError = null;

  for (const baseUrl of API_FALLBACKS) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);

    try {
      const res = await fetch(`${baseUrl}${path}`, {
        ...options,
        signal: controller.signal
      });
      return { res, baseUrl };
    } catch (err) {
      lastError = err;
    } finally {
      clearTimeout(timer);
    }
  }

  throw lastError || new Error("Network error");
}
</script>

</body>
</html>
